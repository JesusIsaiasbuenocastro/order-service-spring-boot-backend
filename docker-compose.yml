# ═══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — Order Service
#
# CÓMO USARLO:
#   Levantar todo:          docker compose up -d
#   Ver logs del app:       docker compose logs -f order-service
#   Detener todo:           docker compose down
#   Detener y borrar datos: docker compose down -v   (borra el volumen de Postgres)
#
# PRERREQUISITO:
#   Tener la imagen del app. Si no la tienes, corre primero:
#     mvn clean package -DskipTests
#     docker build -t order-service:latest .
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── BASE DE DATOS ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine          # alpine = imagen más liviana (~80MB vs ~400MB)
    container_name: orders-postgres
    restart: unless-stopped            # Se reinicia automáticamente salvo que lo pares tú
    environment:
      POSTGRES_DB: orders_db           # Nombre de la base de datos que crea automáticamente
      POSTGRES_USER: admin             # Usuario de la BD
      POSTGRES_PASSWORD: admin         # Contraseña (en prod usa Docker Secrets o .env)
    ports:
      - "5432:5432"                    # HOST:CONTENEDOR — te permite conectar desde DBeaver/pgAdmin
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Persiste los datos aunque el contenedor muera
    healthcheck:
      # Docker espera a que Postgres esté listo antes de levantar el app
      test: ["CMD-SHELL", "pg_isready -U admin -d orders_db"]
      interval: 10s      # Revisa cada 10 segundos
      timeout: 5s        # Máximo 5 segundos para responder
      retries: 5         # Si falla 5 veces seguidas, el servicio se marca unhealthy
    networks:
      - orders-network

  # ── APLICACIÓN SPRING BOOT ──────────────────────────────────────────────────
  order-service:
    image: order-service:latest        # Nombre de la imagen que construiste con docker build
    container_name: order-service-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy     # NO arranca hasta que Postgres pase el healthcheck
    environment:
      # Estas variables sobreescriben los defaults del application.yml
      # "postgres" es el nombre del servicio de arriba — Docker los resuelve por nombre
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"                    # Swagger disponible en http://localhost:8080/swagger-ui.html
    networks:
      - orders-network

# ── VOLÚMENES ──────────────────────────────────────────────────────────────────
# Los volúmenes son el mecanismo de Docker para persistir datos fuera del contenedor.
# Sin esto, cada vez que haces "docker compose down", pierdes todos los registros de BD.
volumes:
  postgres_data:
    driver: local

# ── RED INTERNA ────────────────────────────────────────────────────────────────
# Red privada entre contenedores. El app habla con Postgres por nombre de servicio
# sin exponer Postgres directamente a internet (solo tú puedes conectarte vía 5432).
networks:
  orders-network:
    driver: bridge
